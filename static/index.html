<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/images/icon-192.png">
    <title>Semptify55 - Your Lease. Your Documents. Your Deposit.</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="manifest" href="/static/manifest.json">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>Semptify55</h1>
            <p class="tagline">Your lease. Your documents. Your deposit.</p>
        </header>

        <main class="app-main">
            <section id="auth-section" class="section">
                <h2>Connect Your Storage</h2>
                <p class="subtitle">Your data stays in your cloud. We never store it.</p>
                <div class="storage-buttons">
                    <button class="btn btn-storage btn-google" data-provider="google_drive">
                        <span class="icon">📁</span> Google Drive
                    </button>
                    <button class="btn btn-storage btn-dropbox" data-provider="dropbox">
                        <span class="icon">📦</span> Dropbox
                    </button>
                    <button class="btn btn-storage btn-onedrive" data-provider="onedrive">
                        <span class="icon">☁️</span> OneDrive
                    </button>
                </div>
            </section>

            <section id="cases-section" class="section hidden">
                <div class="section-header">
                    <h2>Your Cases</h2>
                    <button id="new-case-btn" class="btn btn-primary">+ New Case</button>
                </div>
                <div id="cases-list" class="cards-list">
                    <p class="empty-state">No cases yet. Create your first case.</p>
                </div>
            </section>

            <section id="tidbits-section" class="section hidden">
                <h2>Tenant Tidbits</h2>
                <div id="tidbits-list" class="tidbits-list">
                    <p class="empty-state">Loading tips...</p>
                </div>
            </section>
        </main>

        <nav class="app-nav hidden">
            <button class="nav-btn active" data-view="cases">Cases</button>
            <button class="nav-btn" data-view="tidbits">Tips</button>
            <button class="nav-btn" data-view="settings">Settings</button>
        </nav>
    </div>

    <div id="case-modal" class="modal hidden">
        <div class="modal-content">
            <h3>New Case</h3>
            <form id="case-form">
                <div class="form-group">
                    <label for="case-title">Title</label>
                    <input type="text" id="case-title" required placeholder="e.g., Deposit Dispute - 123 Main St">
                </div>
                <div class="form-group">
                    <label for="case-type">Type</label>
                    <select id="case-type">
                        <option value="deposit_dispute">Deposit Dispute</option>
                        <option value="repair_issue">Repair Issue</option>
                        <option value="lease_violation">Lease Violation</option>
                        <option value="eviction_defense">Eviction Defense</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="case-description">Description</label>
                    <textarea id="case-description" rows="3" placeholder="Brief description..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-case">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Case</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>

# Render.com Blueprint for Semptify55
# Deploys: Web service + PostgreSQL + Redis

services:
  - type: web
    name: semptify55
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: semptify55-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: semptify55-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SECURITY_MODE
        value: enforced
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://semptify55.onrender.com
      # OAuth - set manually in Render dashboard
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: ONEDRIVE_CLIENT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
    healthCheckPath: /health

  - type: redis
    name: semptify55-redis
    plan: free
    ipAllowList: []

databases:
  - name: semptify55-db
    databaseName: semptify55
    user: semptify55
    plan: free
